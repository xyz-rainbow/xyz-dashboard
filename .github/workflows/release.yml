name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest"
            args: "--bundles dmg"
            artifact_note: "Official macOS artifact: .dmg"
          - platform: "ubuntu-22.04"
            args: "--bundles appimage,deb"
            artifact_note: "Official Linux artifacts: .AppImage + .deb"
          - platform: "windows-latest"
            args: "--bundles nsis"
            artifact_note: "Official Windows artifact: .exe (NSIS)"

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and publish release artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "XYZ Dashboard ${{ github.ref_name }}"
          releaseBody: |
            Cross-platform build artifacts for ${{ github.ref_name }}.

            Official outputs:
            - Linux: `.AppImage`, `.deb`
            - macOS: `.dmg`
            - Windows: `.exe` (NSIS)

            Generated in job: ${{ matrix.artifact_note }}
          releaseDraft: false
          prerelease: false
          includeDebug: false
          includeUpdaterJson: false
          args: ${{ matrix.args }}
