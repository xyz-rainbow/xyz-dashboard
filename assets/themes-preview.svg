<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">XYZ Dashboard Themes Preview</title>
  <desc id="desc">Preview cards for Lime, Cyber, Aurora, and Darkmoon themes used in Settings.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c0f1f"/>
      <stop offset="100%" stop-color="#13142e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <linearGradient id="lime" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d7ff63"/>
      <stop offset="55%" stop-color="#6be36d"/>
      <stop offset="100%" stop-color="#2f9d57"/>
    </linearGradient>
    <linearGradient id="cyber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#27ecff"/>
      <stop offset="55%" stop-color="#586cff"/>
      <stop offset="100%" stop-color="#ff44cb"/>
    </linearGradient>
    <linearGradient id="aurora" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7ef2ff"/>
      <stop offset="45%" stop-color="#63c9ff"/>
      <stop offset="100%" stop-color="#8b7aff"/>
    </linearGradient>
    <linearGradient id="darkmoon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1d2e"/>
      <stop offset="60%" stop-color="#2a2342"/>
      <stop offset="100%" stop-color="#0f1426"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)"/>
  <text x="120" y="95" fill="#d8defa" font-family="monospace" font-size="30" letter-spacing="1.5">Theme Presets</text>
  <text x="120" y="124" fill="#9aa8cf" font-family="monospace" font-size="14">Settings ’ Appearance</text>

  <g filter="url(#shadow)">
    <rect x="110" y="165" width="460" height="230" rx="28" fill="#0d101b" stroke="#6effaa" stroke-opacity="0.45"/>
    <rect x="630" y="165" width="460" height="230" rx="28" fill="#0d101b" stroke="#55d6ff" stroke-opacity="0.45"/>
    <rect x="110" y="430" width="460" height="230" rx="28" fill="#0d101b" stroke="#8cf3ff" stroke-opacity="0.45"/>
    <rect x="630" y="430" width="460" height="230" rx="28" fill="#0d101b" stroke="#bfa4ff" stroke-opacity="0.55"/>
  </g>

  <g>
    <rect x="145" y="195" width="390" height="130" rx="16" fill="url(#lime)"/>
    <rect x="665" y="195" width="390" height="130" rx="16" fill="url(#cyber)"/>
    <rect x="145" y="460" width="390" height="130" rx="16" fill="url(#aurora)"/>
    <rect x="665" y="460" width="390" height="130" rx="16" fill="url(#darkmoon)"/>

    <rect x="186" y="228" width="42" height="42" rx="11" fill="#ffffff" fill-opacity="0.25"/>
    <rect x="270" y="228" width="42" height="42" rx="11" fill="#000000" fill-opacity="0.17"/>
    <rect x="228" y="280" width="42" height="42" rx="11" fill="#ffffff" fill-opacity="0.2"/>
    <rect x="354" y="280" width="42" height="42" rx="11" fill="#000000" fill-opacity="0.2"/>

    <rect x="706" y="228" width="42" height="42" rx="11" fill="#ffffff" fill-opacity="0.2"/>
    <rect x="790" y="228" width="42" height="42" rx="11" fill="#000000" fill-opacity="0.18"/>
    <rect x="748" y="280" width="42" height="42" rx="11" fill="#ffffff" fill-opacity="0.22"/>
    <rect x="874" y="280" width="42" height="42" rx="11" fill="#000000" fill-opacity="0.2"/>

    <rect x="186" y="493" width="42" height="42" rx="11" fill="#ffffff" fill-opacity="0.24"/>
    <rect x="270" y="493" width="42" height="42" rx="11" fill="#000000" fill-opacity="0.16"/>
    <rect x="228" y="545" width="42" height="42" rx="11" fill="#ffffff" fill-opacity="0.2"/>
    <rect x="354" y="545" width="42" height="42" rx="11" fill="#000000" fill-opacity="0.2"/>

    <rect x="706" y="493" width="42" height="42" rx="11" fill="#ffffff" fill-opacity="0.18"/>
    <rect x="790" y="493" width="42" height="42" rx="11" fill="#000000" fill-opacity="0.2"/>
    <rect x="748" y="545" width="42" height="42" rx="11" fill="#ffffff" fill-opacity="0.2"/>
    <rect x="874" y="545" width="42" height="42" rx="11" fill="#000000" fill-opacity="0.24"/>
  </g>

  <g fill="#e4e7fb" font-family="monospace" font-size="30" letter-spacing="2.5">
    <text x="150" y="367">LIME</text>
    <text x="670" y="367">CYBER</text>
    <text x="150" y="632">AURORA</text>
    <text x="670" y="632">DARKMOON</text>
  </g>
  <g fill="#a4accf" font-family="monospace" font-size="16">
    <text x="150" y="388">Lime neon</text>
    <text x="670" y="388">Cyberpunk blend</text>
    <text x="150" y="653">Polar glow</text>
    <text x="670" y="653">Deep midnight</text>
  </g>
</svg>
