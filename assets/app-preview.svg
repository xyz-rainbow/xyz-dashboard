<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">XYZ Dashboard App Preview</title>
  <desc id="desc">Stylized preview of the XYZ Dashboard interface with glass panel, 3 by 3 shortcut grid, controls and settings icon.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1023"/>
      <stop offset="45%" stop-color="#1a1740"/>
      <stop offset="100%" stop-color="#07121a"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.2" cy="0.2" r="0.6">
      <stop offset="0%" stop-color="#6df6ff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#6df6ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.8" cy="0.75" r="0.6">
      <stop offset="0%" stop-color="#9a6dff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#9a6dff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panelStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9cefff" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#c38fff" stop-opacity="0.35"/>
    </linearGradient>
    <linearGradient id="btnFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.04"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)"/>
  <rect width="1200" height="720" fill="url(#glow1)"/>
  <rect width="1200" height="720" fill="url(#glow2)"/>

  <g filter="url(#shadow)">
    <rect x="275" y="70" width="650" height="580" rx="28" fill="#0f111d" fill-opacity="0.62" stroke="url(#panelStroke)" stroke-width="1.5"/>
    <rect x="275" y="70" width="650" height="580" rx="28" fill="#ffffff" fill-opacity="0.03"/>
  </g>

  <text x="315" y="112" fill="#d7defa" font-family="monospace" font-size="20" letter-spacing="1.2">XYZ Dashboard</text>
  <text x="315" y="138" fill="#9ea9cc" font-family="monospace" font-size="12">Floating macro-pad launcher</text>

  <g transform="translate(332,170)">
    <rect x="0" y="0" width="160" height="130" rx="16" fill="url(#btnFill)" stroke="#ffffff" stroke-opacity="0.18"/>
    <rect x="182" y="0" width="160" height="130" rx="16" fill="url(#btnFill)" stroke="#ffffff" stroke-opacity="0.18"/>
    <rect x="364" y="0" width="160" height="130" rx="16" fill="url(#btnFill)" stroke="#ffffff" stroke-opacity="0.18"/>
    <rect x="0" y="148" width="160" height="130" rx="16" fill="url(#btnFill)" stroke="#ffffff" stroke-opacity="0.18"/>
    <rect x="182" y="148" width="160" height="130" rx="16" fill="url(#btnFill)" stroke="#ffffff" stroke-opacity="0.18"/>
    <rect x="364" y="148" width="160" height="130" rx="16" fill="url(#btnFill)" stroke="#ffffff" stroke-opacity="0.18"/>
    <rect x="0" y="296" width="160" height="130" rx="16" fill="url(#btnFill)" stroke="#ffffff" stroke-opacity="0.18"/>
    <rect x="182" y="296" width="160" height="130" rx="16" fill="url(#btnFill)" stroke="#ffffff" stroke-opacity="0.18"/>
    <rect x="364" y="296" width="160" height="130" rx="16" fill="url(#btnFill)" stroke="#ffffff" stroke-opacity="0.18"/>

    <circle cx="80" cy="62" r="16" fill="#73f6ff" fill-opacity="0.75"/>
    <circle cx="262" cy="62" r="16" fill="#f69eff" fill-opacity="0.7"/>
    <circle cx="444" cy="62" r="16" fill="#9dff81" fill-opacity="0.72"/>
    <circle cx="80" cy="210" r="16" fill="#ffb76a" fill-opacity="0.76"/>
    <circle cx="262" cy="210" r="16" fill="#8ba5ff" fill-opacity="0.75"/>
    <circle cx="444" cy="210" r="16" fill="#6dffd6" fill-opacity="0.75"/>
    <circle cx="80" cy="358" r="16" fill="#ff7da5" fill-opacity="0.76"/>
    <circle cx="262" cy="358" r="16" fill="#ffd96d" fill-opacity="0.76"/>
    <circle cx="444" cy="358" r="16" fill="#90ecff" fill-opacity="0.76"/>
  </g>

  <g transform="translate(315,604)">
    <rect x="0" y="0" width="58" height="26" rx="13" fill="#ffffff" fill-opacity="0.1" stroke="#ffffff" stroke-opacity="0.22"/>
    <rect x="68" y="0" width="58" height="26" rx="13" fill="#ffffff" fill-opacity="0.1" stroke="#ffffff" stroke-opacity="0.22"/>
    <rect x="136" y="0" width="58" height="26" rx="13" fill="#ffffff" fill-opacity="0.1" stroke="#ffffff" stroke-opacity="0.22"/>
    <rect x="204" y="0" width="58" height="26" rx="13" fill="#ffffff" fill-opacity="0.1" stroke="#ffffff" stroke-opacity="0.22"/>
  </g>

  <g transform="translate(868,594)">
    <circle cx="24" cy="24" r="20" fill="#111829" stroke="#a2d8ff" stroke-opacity="0.5"/>
    <path d="M24 13.5l2.4 2.3 3.3-.6.8 3.2 3.1 1.4-1.7 2.9 1.7 2.9-3.1 1.4-.8 3.2-3.3-.6-2.4 2.3-2.4-2.3-3.3.6-.8-3.2-3.1-1.4 1.7-2.9-1.7-2.9 3.1-1.4.8-3.2 3.3.6z" fill="#9f85ff" fill-opacity="0.8"/>
    <circle cx="24" cy="24" r="5.5" fill="#d9d0ff"/>
  </g>
</svg>
